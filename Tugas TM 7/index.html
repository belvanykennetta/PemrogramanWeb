<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambahan Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --midnight-bg: #1a1a2e;
            --midnight-card: #ffffff;
            --midnight-primary: #2d325a;
            --midnight-accent: #ff758f;
            --midnight-gray: #f8f9fa;
        }

        body {
            background-color: var(--midnight-bg);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .main-card {
            background: var(--midnight-card);
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 480px;
            min-height: 600px;
            border: none;
            display: flex;
            flex-direction: column;
        }

        /* Nav Pills Styling */
        .nav-pills .nav-link {
            color: white;
            background-color: var(--midnight-primary);
            border-radius: 30px;
            margin: 0 5px;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 10px 18px;
            transition: 0.3s;
        }

        .nav-pills .nav-link.active {
            background-color: var(--midnight-accent) !important;
        }

        /* Inner Tab Styling for Auth */
        .nav-tabs .nav-link {
            color: #6c757d;
            font-weight: 600;
            border: none;
            border-bottom: 2px solid transparent;
        }

        .nav-tabs .nav-link.active {
            color: var(--midnight-accent) !important;
            border-bottom: 2px solid var(--midnight-accent) !important;
            background: transparent;
        }

        /* Form Controls */
        .form-control, .form-select {
            border-radius: 12px;
            border: 1.5px solid #e0e0e0;
            padding: 12px;
            font-size: 0.95rem;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--midnight-accent);
            box-shadow: 0 0 0 0.25rem rgba(255, 117, 143, 0.15);
        }

        /* Checkbox Styling */
        .form-check-input:checked {
            background-color: var(--midnight-accent);
            border-color: var(--midnight-accent);
        }

        /* Buttons */
        .btn-midnight {
            background-color: var(--midnight-primary);
            color: white;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            border: none;
            width: 100%;
            transition: 0.3s ease;
        }

        .btn-midnight:hover {
            background-color: var(--midnight-accent);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 117, 143, 0.3);
        }

        /* History & Results */
        .history-item {
            background: var(--midnight-gray);
            border-left: 4px solid var(--midnight-accent);
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .postal-result {
            background: var(--midnight-primary);
            color: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            margin-top: 20px;
        }

        .accent-text { color: var(--midnight-accent); }
        
        .ls-1 { letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="main-card p-4 p-md-5">
    <ul class="nav nav-pills justify-content-center mb-4" id="pills-tab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="pills-auth-tab" data-bs-toggle="pill" data-bs-target="#pills-auth" type="button" role="tab">Auth Portal</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="pills-academic-tab" data-bs-toggle="pill" data-bs-target="#pills-academic" type="button" role="tab">Akademik</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="pills-postal-tab" data-bs-toggle="pill" data-bs-target="#pills-postal" type="button" role="tab">Postal</button>
        </li>
    </ul>

    <div class="tab-content" id="pills-tabContent">
        
        <div class="tab-pane fade show active" id="pills-auth" role="tabpanel">
            <h4 class="text-center mb-4 fw-bold" style="color: var(--midnight-primary)">Midnight Portal</h4>
            
            <nav class="mb-4">
                <div class="nav nav-tabs border-0 justify-content-center" id="nav-auth-tab" role="tablist">
                    <button class="nav-link active" id="nav-login-tab" data-bs-toggle="tab" data-bs-target="#nav-login" type="button" role="tab">Login</button>
                    <button class="nav-link" id="nav-signup-tab" data-bs-toggle="tab" data-bs-target="#nav-signup" type="button" role="tab">Sign Up</button>
                </div>
            </nav>

            <div class="tab-content" id="nav-authTabContent">
                <div class="tab-pane fade show active" id="nav-login" role="tabpanel">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Email Mahasiswa</label>
                        <input type="email" class="form-control" placeholder="Masukkan email mahasiswa anda">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Password</label>
                        <input type="password" class="form-control" placeholder="••••••••">
                    </div>
                    
                    <div class="mb-4 d-flex justify-content-between align-items-center">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label small" for="rememberMe" style="cursor:pointer">
                                Remember me
                            </label>
                        </div>
                        <a href="#" class="small text-decoration-none fw-bold" style="color: var(--midnight-accent)">Lupa Password?</a>
                    </div>
                    
                    <button class="btn btn-midnight shadow-sm">Sign In</button>
                </div>

                <div class="tab-pane fade" id="nav-signup" role="tabpanel">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Nama Lengkap</label>
                        <input type="text" class="form-control" placeholder="John Doe">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Email Kampus</label>
                        <input type="email" class="form-control" placeholder="nama@it.ac.id">
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-secondary">Password Baru</label>
                        <input type="password" class="form-control" placeholder="Minimal 8 karakter">
                    </div>
                    <button class="btn btn-midnight shadow-sm">Create Account</button>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="pills-academic" role="tabpanel">
            <h4 class="text-center mb-4 fw-bold" style="color: var(--midnight-primary)">Registrasi Matkul</h4>
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Nama Mahasiswa</label>
                <input type="text" id="reg-nama" class="form-control" placeholder="Masukkan nama...">
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Pilih Mata Kuliah</label>
                <select id="reg-matkul" class="form-select">
                    <option value="">-- Pilih Matkul --</option>
                    <option value="Pemrosesan Bahasa Natural">Pemrosesan Bahasa Natural</option>
                    <option value="Pemrograman Web">Pemrograman Web</option>
                    <option value="Deep Learning">Deep Learning</option>
                    <option value="Grafika Komputer">Grafika Komputer</option>
                </select>
            </div>
            <button class="btn btn-midnight mb-4" onclick="handleRegistration()">Submit Registrasi</button>
            
            <div class="border-top pt-3">
                <h6 class="fw-bold mb-3 small text-uppercase ls-1 text-secondary">History Terbaru</h6>
                <div id="history-list">
                    <div class="history-item">
                        <strong>Pemrograman Web</strong><br>
                        <span class="text-muted">Ahmad (5025211001)</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="pills-postal" role="tabpanel">
            <h4 class="text-center mb-4 fw-bold" style="color: var(--midnight-primary)">Postal Finder</h4>
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Provinsi</label>
                <select class="form-select mb-3"><option>Jawa Timur</option></select>
                
                <label class="form-label small fw-bold text-secondary">Kota / Kabupaten</label>
                <select class="form-select mb-3"><option>Surabaya</option></select>
                
                <label class="form-label small fw-bold text-secondary">Kecamatan</label>
                <select class="form-select mb-3"><option>Sukolilo</option></select>
            </div>
            
            <div class="postal-result shadow">
                <div class="small text-uppercase ls-1 opacity-75">Hasil Kode Pos</div>
                <h1 class="display-3 fw-bold accent-text mb-0">60111</h1>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Fungsi sederhana untuk simulasi registrasi
    function handleRegistration() {
        const nama = document.getElementById('reg-nama').value;
        const matkul = document.getElementById('reg-matkul').value;
        
        if(!nama || !matkul) {
            alert("Mohon lengkapi data registrasi!");
            return;
        }

        const list = document.getElementById('history-list');
        const item = document.createElement('div');
        item.className = 'history-item animate__animated animate__fadeIn';
        item.innerHTML = `<strong>${matkul}</strong><br><span class="text-muted">${nama} - Baru Saja</span>`;
        
        list.prepend(item);
        
        // Reset field
        document.getElementById('reg-nama').value = "";
        document.getElementById('reg-matkul').value = "";
    }
</script>

</body>
</html>
